name: Build macOS App

on:
  workflow_dispatch:  # manual trigger for testing
  push:
    branches: [ feature/macos-windows-support ]
    tags:
      - 'v*'         # run on version tags

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ffmpeg and ffprobe (macOS static build)
        run: |
          mkdir -p binaries
          # Download ffmpeg
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg.zip
          mv ffmpeg binaries/ffmpeg
          # Download ffprobe (Ensure correct URL and extraction)
          curl -L -o ffprobe.zip https://evermeet.cx/ffprobe/getrelease/zip
          unzip -o ffprobe.zip
          mv ffprobe binaries/ffprobe
          chmod +x binaries/ffmpeg binaries/ffprobe

      - name: Build with PyInstaller
        run: |
          pyinstaller clipSorter.spec --clean --noconfirm
          ls -la dist/

      - name: Package artifact
        run: |
          cd dist
          # The spec file creates ClipSorter.app for macOS
          zip -r ../clipSorter-macOS.zip ClipSorter.app || zip -r ../clipSorter-macOS.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipSorter-macOS
          path: clipSorter-macOS.zip
