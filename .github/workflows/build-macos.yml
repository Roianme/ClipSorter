name: Build macOS App

on:
  workflow_dispatch:  # manual trigger for testing
  push:
    tags:
      - 'v*'         # run on version tags

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: intel
            os: macos-13
            suffix: Intel
          - arch: silicon
            os: macos-14
            suffix: AppleSilicon
    
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.arch }})
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          brew install libmagic
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ffmpeg and ffprobe (Intel)
        if: matrix.arch == 'intel'
        run: |
          mkdir -p binaries
          # Download ffmpeg
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg.zip -d bin_ffmpeg
          mv bin_ffmpeg/ffmpeg binaries/ffmpeg
          
          # Download ffprobe
          curl -L -o ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o ffprobe.zip -d bin_ffprobe
          mv bin_ffprobe/ffprobe binaries/ffprobe
          
          chmod +x binaries/ffmpeg binaries/ffprobe
          rm -rf bin_ffmpeg bin_ffprobe ffmpeg.zip ffprobe.zip

      - name: Install ffmpeg and ffprobe (Apple Silicon)
        if: matrix.arch == 'silicon'
        run: |
          mkdir -p binaries
          brew install ffmpeg
          cp $(which ffmpeg) binaries/ffmpeg
          cp $(which ffprobe) binaries/ffprobe
          chmod +x binaries/ffmpeg binaries/ffprobe

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller clipSorter.spec --clean --noconfirm

      - name: Package artifact
        run: |
          # Remove one-dir build to keep artifact lean
          rm -rf dist/ClipSorter-GUI-QuickStart

          cd dist
          # Create arch-specific zip
          zip -ry ../ClipSorter-macOS-${{ matrix.suffix }}.zip ClipSorter.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipSorter-macOS-${{ matrix.suffix }}
          path: ClipSorter-macOS-${{ matrix.suffix }}.zip

  smoke-test:
    needs: build-macos
    strategy:
      matrix:
        include:
          - arch: intel
            os: macos-13
            suffix: Intel
          - arch: silicon
            os: macos-14
            suffix: AppleSilicon
    runs-on: ${{ matrix.os }}
    name: Smoke Test (${{ matrix.arch }})
    
    steps:
      - name: Download built app
        uses: actions/download-artifact@v4
        with:
          name: ClipSorter-macOS-${{ matrix.suffix }}

      - name: Smoke test (launch & quit)
        run: |
          unzip ClipSorter-macOS-${{ matrix.suffix }}.zip
          chmod -R +x ClipSorter.app
          
          # Launch app
          open "$PWD/ClipSorter.app"
          sleep 15
          
          # Graceful quit
          osascript -e 'tell application "ClipSorter" to quit'
          echo "Smoke test for ${{ matrix.arch }} finished."
