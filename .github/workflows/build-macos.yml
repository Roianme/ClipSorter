name: Build macOS App

on:
  workflow_dispatch:  # manual trigger for testing
  push:
    tags:
      - 'v*'         # run on version tags

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          brew install libmagic
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ffmpeg and ffprobe (macOS static build)
        run: |
          mkdir -p binaries
          # Download ffmpeg
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg.zip -d bin_ffmpeg
          mv bin_ffmpeg/ffmpeg binaries/ffmpeg
          
          # Download ffprobe (Corrected URL)
          curl -L -o ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o ffprobe.zip -d bin_ffprobe
          mv bin_ffprobe/ffprobe binaries/ffprobe
          
          chmod +x binaries/ffmpeg binaries/ffprobe
          rm -rf bin_ffmpeg bin_ffprobe ffmpeg.zip ffprobe.zip

      - name: Build with PyInstaller
        run: |
          pyinstaller clipSorter.spec --clean --noconfirm

      - name: Package artifact
        run: |
          # The spec file creates BOTH a folder and an .app bundle.
          # We only want the .app bundle for macOS production.
          rm -rf dist/ClipSorter-GUI-QuickStart

          cd dist
          # -r: recursive, -y: preserve symlinks (ESSENTIAL to stay < 1GB)
          zip -ry ../ClipSorter-macOS-Production.zip ClipSorter.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipSorter-macOS
          path: ClipSorter-macOS-Production.zip

  smoke-test:
    needs: build-macos
    runs-on: macos-latest
    steps:
      - name: Download built app
        uses: actions/download-artifact@v4
        with:
          name: ClipSorter-macOS

      - name: Smoke test (launch & quit)
        run: |
          # The runner downloads the artifact contents directly (the Production zip)
          unzip ClipSorter-macOS-Production.zip
          
          # Make the binary executable
          chmod -R +x ClipSorter.app

          # Launch the app in the background
          open "$PWD/ClipSorter.app"

          # Give it a few seconds to fully open
          sleep 15

          # Ask it to quit gracefully
          # The application name in 'tell application' usually matches the bundle name
          osascript -e 'tell application "ClipSorter" to quit'

          echo "Smoke test finished – app launched and quit."
